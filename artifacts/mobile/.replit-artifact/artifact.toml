kind = "mobile"
previewPath = "/"
title = "El Barka Restaurant"
version = "1.0.0"
id = "artifacts/mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
localPort = 18115
name = "expo"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/mobile run dev"

[services.env]
PORT = "18115"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/mobile", "run", "build"]
run = ["pnpm", "--filter", "@workspace/mobile", "run", "serve"]
